---
layout: default
---

<article class="page-article">
  <header>
    <h1>{{ page.title }}</h1>
  </header>
  {{ content }}
  {% if page.date %}
  <footer>
    Updated on <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
  </footer>
  {% endif %}
</article>
