<div class="post-meta">
    {% assign author = site.data.authors[post.author] %}
    {% if author %}Written by {% if author.url %}<a href="{{ author.url }}">{{ author.name }}</a>{% else %}{{ author.name }}{% endif %}{% elsif post.author %}Written by {{ post.author }}{% endif %} on <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%-d %B %Y" }}</time>
</div>
